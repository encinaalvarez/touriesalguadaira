<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css">
  <script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>
</head>
<body>

<div id="panorama" style="width:100%;height:100vh;"></div>

<script>
pannellum.viewer('panorama', {
  default: {
    firstScene: "entrada",
    autoLoad: true
  },

  scenes: {
    entrada: {
      type: "equirectangular",
      panorama: "assets/scenes/Entrada1.png",
      hotSpots: [
        { pitch: -2, yaw: 12, type: "scene", sceneId: "hall" }
      ]
    },

    hall: {
      type: "equirectangular",
      panorama: "assets/scenes/hall 2.jpeg",
      hotSpots: [
        { pitch: -1, yaw: -60, type: "scene", sceneId: "patio" },
        { pitch: -2, yaw: 58, type: "scene", sceneId: "entrada" }
      ]
    },

    patio: {
      type: "equirectangular",
      panorama: "assets/scenes/patio3.png",
      hotSpots: [
        { pitch: -2, yaw: 25, type: "scene", sceneId: "huerto" }
      ]
    },

    huerto: {
      type: "equirectangular",
      panorama: "assets/scenes/Huerto 5.jpeg",
      hotSpots: [
        { pitch: -3, yaw: -110, type: "scene", sceneId: "gradas" }
      ]
    },

    gradas: {
      type: "equirectangular",
      panorama: "assets/scenes/Gradas 6.png",
      hotSpots: [
        { pitch: -2, yaw: -70, type: "scene", sceneId: "rincon" }
      ]
    },

    rincon: {
      type: "equirectangular",
      panorama: "assets/scenes/RinconMujer 7.png",
      hotSpots: [
        { pitch: -2, yaw: 72, type: "scene", sceneId: "gradas" }
      ]
    }
  }
});
</script>

</body>
</html>
