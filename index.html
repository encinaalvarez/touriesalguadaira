<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Prueba Hall</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css">
</head>
<body>
  <div id="panorama" style="width:100%; height:100vh;"></div>

  <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
  <script>
    const viewer = pannellum.viewer('panorama', {
      type: 'equirectangular',
      panorama: 'assets/scenes/Grada 6.png?v=4',
      autoLoad: true
    });

    document.getElementById('panorama').addEventListener('mousedown', function (e) {
      const coords = viewer.mouseEventToCoords(e);
      console.log('pitch:', coords[0], 'yaw:', coords[1]);
    });
  </script>
</body>
</html>
