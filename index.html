<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css">
  <script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>
</head>
<body>

<div id="panorama" style="width:100%; height:100vh;"></div>

<script>
  var viewer = pannellum.viewer("panorama", {
    "default": {
      "firstScene": "hall",
      "autoLoad": true
    },
    "scenes": {
      "hall": {
        "type": "equirectangular",
        "panorama": "assets/scenes/hall 2.jpeg"
      }
    }
  });

  document.getElementById("panorama").addEventListener("mousedown", function (e) {
    var coords = viewer.mouseEventToCoords(e);
    console.log("pitch:", coords[0], "yaw:", coords[1]);
  });
</script>

</body>
</html>
